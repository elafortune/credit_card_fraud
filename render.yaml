services:
  - type: web
    name: fraud-detection
    runtime: python
    # Build : frontend d'abord (génère dist/), puis dépendances Python
    buildCommand: cd frontend && npm install && npm run build && cd .. && pip install -r backend/requirements.txt
    # Start : FastAPI sert l'API + les fichiers statiques du frontend
    startCommand: cd backend && PYTHONPATH=. uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
